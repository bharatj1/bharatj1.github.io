<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Second Brain</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    height: 100dvh;
    width: 280px;
    background: #111;
    border-right: 1px solid #1f1f1f;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 100;
  }
  #sidebar.open { transform: translateX(0); }

  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .new-chat-btn {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #ccc;
    font-size: 13px;
    font-family: inherit;
    padding: 9px 14px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .new-chat-btn:active { background: #252525; }

  .close-sidebar {
    background: none;
    border: none;
    color: #555;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }

  .sidebar-section {
    font-size: 10px;
    color: #3a3a3a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 14px 16px 6px;
  }

  #chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 16px;
  }

  .chat-item {
    padding: 10px 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .chat-item:active { background: #1a1a1a; }
  .chat-item.active { background: #1e1e1e; }

  .chat-item-title {
    font-size: 13px;
    color: #bbb;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chat-item.active .chat-item-title { color: #ddd; }

  .chat-item-date {
    font-size: 10px;
    color: #3a3a3a;
    flex-shrink: 0;
  }

  .del-btn {
    background: none;
    border: none;
    color: #333;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    opacity: 0;
    flex-shrink: 0;
  }
  .chat-item:hover .del-btn,
  .chat-item.active .del-btn { opacity: 1; }
  .del-btn:active { color: #ef4444; }

  /* Overlay when sidebar open */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    display: none;
  }
  #overlay.show { display: block; }

  /* ── Main area ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    min-width: 0;
  }

  header {
    padding: 12px 14px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .menu-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    flex-shrink: 0;
  }
  .menu-btn:active { color: #888; }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sub { font-size: 11px; color: #333; flex-shrink: 0; }
  .new-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 6px; flex-shrink: 0; opacity: 0.5; }
  .new-btn:active { opacity: 1; transform: scale(0.9); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg { max-width: 90%; font-size: 14px; line-height: 1.55; }

  .msg.you {
    align-self: flex-end;
    background: #1d3a5c;
    color: #ddeeff;
    padding: 10px 14px;
    border-radius: 18px 18px 4px 18px;
  }

  .msg.brain {
    align-self: flex-start;
    background: #1a1a1a;
    color: #ddd;
    padding: 12px 16px;
    border-radius: 4px 18px 18px 18px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.brain .lbl {
    font-size: 10px;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .msg.thinking {
    color: #333;
    font-style: italic;
    font-size: 13px;
    align-self: flex-start;
    padding: 4px 0;
  }

  .hint { text-align: center; color: #222; font-size: 12px; margin: auto; line-height: 2.2; }

  footer {
    padding: 10px 12px;
    border-top: 1px solid #161616;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    background: #0a0a0a;
  }

  .footer-row { display: flex; gap: 8px; align-items: flex-end; }

  textarea {
    flex: 1;
    background: #161616;
    border: 1px solid #222;
    border-radius: 14px;
    color: #e5e5e5;
    font-size: 14px;
    font-family: inherit;
    padding: 10px 14px;
    resize: none;
    height: 44px;
    max-height: 140px;
    outline: none;
    line-height: 1.4;
  }
  textarea:focus { border-color: #303030; }

  button.send {
    background: #2563eb;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 20px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    flex-shrink: 0;
  }
  button.send:active { background: #1d4ed8; transform: scale(0.93); }
  button.send:disabled { background: #161616; color: #252525; }

  button.attach {
    background: none;
    border: 1px solid #252525;
    border-radius: 14px;
    color: #555;
    font-size: 18px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    flex-shrink: 0;
  }
  button.attach:active { color: #aaa; border-color: #444; }

  /* Attachment previews */
  #attachments {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 2px;
  }
  #attachments:empty { display: none; }

  .att-chip {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 6px;
    max-width: 160px;
  }
  .att-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .att-chip .rm {
    color: #444;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    line-height: 1;
  }
  .att-chip .rm:active { color: #ef4444; }

  .att-img-preview {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    cursor: pointer;
    position: relative;
  }
  .att-img-wrap { position: relative; display: inline-block; }
  .att-img-wrap .rm {
    position: absolute;
    top: -6px; right: -6px;
    background: #333;
    border-radius: 50%;
    width: 18px; height: 18px;
    font-size: 11px;
    color: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
  }
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-top">
    <button class="new-chat-btn" onclick="newChat()">
      <span>+</span> New chat
    </button>
    <button class="close-sidebar" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-section">Recents</div>
  <div id="chat-list"></div>
</div>

<!-- Main -->
<div id="main">
  <header>
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div class="dot"></div>
    <h1 id="chat-title">Second Brain</h1>
    <button class="new-btn" onclick="newChat()" title="New chat">✏️</button>
  </header>

  <div id="chat">
    <div class="hint">What do you need to know?<br>Emails · Tickets · Teams · Drafts</div>
  </div>

  <footer>
    <div id="attachments"></div>
    <div class="footer-row">
      <button class="attach" onclick="document.getElementById('file-input').click()" title="Attach file">📎</button>
      <input id="file-input" type="file" style="display:none" multiple
        accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.md,image/*"
        onchange="handleFiles(this.files)">
      <textarea id="inp" placeholder="Ask anything… or paste a screenshot" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
        oninput="autosize(this)"
        onpaste="handlePaste(event)"></textarea>
      <button class="send" id="btn" onclick="send()">↑</button>
    </div>
  </footer>
</div>

<script>
  let sessionId  = null;
  let busy       = false;
  let activeChatId = null;

  // ── Sidebar ────────────────────────────────────────────────────────────────
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('overlay').classList.add('show');
    loadChatList();
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  async function loadChatList() {
    try {
      const r = await fetch('/chats');
      const d = await r.json();
      const list = document.getElementById('chat-list');
      list.innerHTML = '';
      if (!d.chats || d.chats.length === 0) {
        list.innerHTML = '<div style="padding:16px;color:#333;font-size:12px">No chats yet</div>';
        return;
      }
      d.chats.forEach(c => {
        const div = document.createElement('div');
        div.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
        div.innerHTML = `
          <div class="chat-item-title">${esc(c.title)}</div>
          <div class="chat-item-date">${fmtDate(c.updated)}</div>
          <button class="del-btn" onclick="deleteChat(event,'${c.id}')">✕</button>
        `;
        div.onclick = (e) => { if (!e.target.classList.contains('del-btn')) loadChat(c.id, c.title); };
        list.appendChild(div);
      });
    } catch(e) {}
  }

  async function loadChat(id, title) {
    closeSidebar();
    try {
      const r = await fetch(`/chat/${id}`);
      const d = await r.json();
      sessionId    = id;
      activeChatId = id;
      document.getElementById('chat-title').textContent = title || 'Second Brain';

      const chatEl = document.getElementById('chat');
      chatEl.innerHTML = '';
      // Render conversation history
      (d.messages || []).forEach(m => {
        if (m.role === 'user' && typeof m.content === 'string') {
          addMsg(m.content, 'you');
        } else if (m.role === 'assistant' && typeof m.content === 'string') {
          addMsg(m.content, 'brain');
        }
      });
      if (!chatEl.children.length) {
        chatEl.innerHTML = '<div class="hint">What do you need to know?<br>Emails · Tickets · Teams · Drafts</div>';
      }
    } catch(e) {}
  }

  async function deleteChat(e, id) {
    e.stopPropagation();
    await fetch(`/chat/${id}`, { method: 'DELETE' });
    if (id === activeChatId) newChat();
    loadChatList();
  }

  // ── New chat ───────────────────────────────────────────────────────────────
  async function newChat() {
    closeSidebar();
    try {
      const r = await fetch('/new_session');
      const d = await r.json();
      sessionId    = d.session_id;
      activeChatId = null;
    } catch(e) {
      sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
    }
    document.getElementById('chat-title').textContent = 'Second Brain';
    document.getElementById('chat').innerHTML =
      '<div class="hint">What do you need to know?<br>Emails · Tickets · Teams · Drafts</div>';
    document.getElementById('inp').focus();
  }

  // ── Chat ───────────────────────────────────────────────────────────────────
  function autosize(el) {
    el.style.height = '44px';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function addMsg(text, type) {
    document.querySelector('.hint')?.remove();
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    if (type === 'brain') {
      d.innerHTML = `<div class="lbl">Brain</div>${esc(text)}`;
    } else if (type === 'thinking') {
      d.textContent = text;
    } else {
      d.textContent = text;
    }
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return d;
  }

  function esc(t) {
    return String(t)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 86400) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    if (diff < 604800) return d.toLocaleDateString([], {weekday:'short'});
    return d.toLocaleDateString([], {day:'numeric',month:'short'});
  }

  async function send() {
    if (busy) return;
    const inp   = document.getElementById('inp');
    const q     = inp.value.trim();
    const files = [...pendingFiles];

    if (!q && !files.length) return;

    inp.value = '';
    inp.style.height = '44px';
    pendingFiles = [];
    renderAttachments();

    if (!activeChatId) {
      const short = (q || files[0]?.name || 'Attachment').slice(0, 50);
      document.getElementById('chat-title').textContent = short + (short.length >= 50 ? '...' : '');
      activeChatId = sessionId;
    }

    // Show images inline, show text bubble
    renderAttachedInChat(files);
    if (q) addMsg(q, 'you');

    busy = true;
    document.getElementById('btn').disabled = true;
    const thinking = addMsg('Checking sources...', 'thinking');

    try {
      const payload = {
        q,
        session_id: sessionId,
        files: files.map(f => ({ name: f.name, mime: f.mime, data: f.data }))
      };
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: AbortSignal.timeout(120000),
      });
      const data = await res.json();
      thinking.remove();
      addMsg(data.ok ? data.answer : 'Error: ' + data.msg, 'brain');
    } catch(e) {
      thinking.remove();
      addMsg(e.name === 'TimeoutError' ? 'Timed out.' : 'Cannot reach PC.', 'brain');
    }

    busy = false;
    document.getElementById('btn').disabled = false;
    inp.focus();
  }

  // ── File attachments ───────────────────────────────────────────────────────
  let pendingFiles = []; // [{name, mime, data (base64), preview}]

  function handlePaste(e) {
    const items = e.clipboardData?.items || [];
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (file) addFile(file);
        return;
      }
    }
  }

  function handleFiles(fileList) {
    Array.from(fileList).forEach(addFile);
    document.getElementById('file-input').value = '';
  }

  function addFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl  = e.target.result;
      const b64      = dataUrl.split(',')[1];
      const isImage  = file.type.startsWith('image/');
      const id       = Date.now() + Math.random();

      pendingFiles.push({ id, name: file.name, mime: file.type, data: b64, isImage });
      renderAttachments();
    };
    reader.readAsDataURL(file);
  }

  function removeFile(id) {
    pendingFiles = pendingFiles.filter(f => f.id !== id);
    renderAttachments();
  }

  function renderAttachments() {
    const el = document.getElementById('attachments');
    el.innerHTML = '';
    pendingFiles.forEach(f => {
      if (f.isImage) {
        const wrap = document.createElement('div');
        wrap.className = 'att-img-wrap';
        wrap.innerHTML = `
          <img class="att-img-preview" src="data:${f.mime};base64,${f.data}">
          <div class="rm" onclick="removeFile(${f.id})">✕</div>
        `;
        el.appendChild(wrap);
      } else {
        const chip = document.createElement('div');
        chip.className = 'att-chip';
        const icon = f.mime.includes('pdf') ? '📄' :
                     f.mime.includes('word') || f.name.endsWith('.docx') ? '📝' :
                     f.mime.includes('sheet') || f.name.endsWith('.xlsx') ? '📊' :
                     f.mime.includes('presentation') || f.name.endsWith('.pptx') ? '📑' : '📎';
        chip.innerHTML = `<span>${icon} ${esc(f.name)}</span><span class="rm" onclick="removeFile(${f.id})">✕</span>`;
        el.appendChild(chip);
      }
    });
  }

  // Show attached files inline in chat
  function renderAttachedInChat(files) {
    files.forEach(f => {
      if (f.isImage) {
        const d = document.createElement('div');
        d.className = 'msg you';
        d.style.padding = '6px';
        d.innerHTML = `<img src="data:${f.mime};base64,${f.data}" style="max-width:100%;border-radius:10px;display:block">`;
        document.getElementById('chat').appendChild(d);
      }
    });
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  newChat();
</script>
</body>
</html>
