<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Second Brain</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 16px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }

  header h1 { font-size: 15px; font-weight: 600; color: #ccc; flex: 1; }

  .clear-btn {
    font-size: 11px;
    color: #444;
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .clear-btn:active { color: #888; border-color: #444; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg { max-width: 90%; font-size: 14px; line-height: 1.55; }

  .msg.you {
    align-self: flex-end;
    background: #1d3a5c;
    color: #ddeeff;
    padding: 10px 14px;
    border-radius: 18px 18px 4px 18px;
  }

  .msg.brain {
    align-self: flex-start;
    background: #1a1a1a;
    color: #ddd;
    padding: 12px 16px;
    border-radius: 4px 18px 18px 18px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.brain .lbl {
    font-size: 10px;
    color: #3a3a3a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .msg.thinking { color: #3a3a3a; font-style: italic; background: transparent; padding: 4px 0; align-self: flex-start; font-size: 13px; }

  .tile.success .status { color: #4ade80; }
  .tile.error   .status { color: #f87171; }

  .hint { text-align: center; color: #252525; font-size: 12px; margin: auto; line-height: 2; }

  footer {
    padding: 10px 12px;
    border-top: 1px solid #161616;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: #0a0a0a;
  }

  textarea {
    flex: 1;
    background: #161616;
    border: 1px solid #252525;
    border-radius: 14px;
    color: #e5e5e5;
    font-size: 14px;
    font-family: inherit;
    padding: 10px 14px;
    resize: none;
    height: 44px;
    max-height: 140px;
    outline: none;
    line-height: 1.4;
  }
  textarea:focus { border-color: #333; }

  button.send {
    background: #2563eb;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 20px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    flex-shrink: 0;
  }
  button.send:active { background: #1d4ed8; transform: scale(0.93); }
  button.send:disabled { background: #161616; color: #2a2a2a; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Second Brain</h1>
  <button class="clear-btn" onclick="newSession()">New chat</button>
</header>

<div id="chat">
  <div class="hint">
    What do you need to know?<br>
    Emails · Tickets · Teams · Drafts
  </div>
</div>

<footer>
  <textarea id="inp" placeholder="Ask anything..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
    oninput="autosize(this)"></textarea>
  <button class="send" id="btn" onclick="send()">↑</button>
</footer>

<script>
  let sessionId = null;
  let busy = false;

  // Init session on load
  async function initSession() {
    try {
      const r = await fetch('/new_session');
      const d = await r.json();
      sessionId = d.session_id;
    } catch(e) {
      sessionId = 'default';
    }
  }
  initSession();

  function autosize(el) {
    el.style.height = '44px';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function addMsg(text, type) {
    document.querySelector('.hint')?.remove();
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    if (type === 'brain') {
      d.innerHTML = `<div class="lbl">Brain</div>${esc(text)}`;
    } else if (type === 'thinking') {
      d.textContent = text;
    } else {
      d.textContent = text;
    }
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return d;
  }

  function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function send() {
    if (busy) return;
    const inp = document.getElementById('inp');
    const q = inp.value.trim();
    if (!q) return;

    inp.value = '';
    inp.style.height = '44px';
    addMsg(q, 'you');

    busy = true;
    document.getElementById('btn').disabled = true;

    const thinking = addMsg('Checking sources...', 'thinking');

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q, session_id: sessionId }),
        signal: AbortSignal.timeout(120000),
      });
      const data = await res.json();
      thinking.remove();
      addMsg(data.ok ? data.answer : 'Error: ' + data.msg, 'brain');
    } catch(e) {
      thinking.remove();
      addMsg(e.name === 'TimeoutError' ? 'Timed out. Try a shorter question.' : 'Cannot reach PC.', 'brain');
    }

    busy = false;
    document.getElementById('btn').disabled = false;
    inp.focus();
  }

  async function newSession() {
    await initSession();
    const chat = document.getElementById('chat');
    chat.innerHTML = '<div class="hint">What do you need to know?<br>Emails · Tickets · Teams · Drafts</div>';
  }
</script>
</body>
</html>
